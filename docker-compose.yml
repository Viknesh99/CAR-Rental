version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: rentacar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rentacar}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-rentacar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./Car-Rental-Service-Spring-Angular-NGZorro/Spring Boot
      dockerfile: Dockerfile
    container_name: rentacar_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-rentacar}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ── Angular Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Car-Rental-Service-Spring-Angular-NGZorro/Angular
      dockerfile: Dockerfile
    container_name: rentacar_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
