version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: rentacar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rentacar
      POSTGRES_USER: rentacar
      POSTGRES_PASSWORD: rentacar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentacar -d rentacar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./Car-Rental-Service-Spring-Angular-NGZorro/Spring Boot
      dockerfile: Dockerfile
    container_name: rentacar_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://rentacar:rentacar@db:5432/rentacar
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ── Angular Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Car-Rental-Service-Spring-Angular-NGZorro/Angular
      dockerfile: Dockerfile
    container_name: rentacar_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
