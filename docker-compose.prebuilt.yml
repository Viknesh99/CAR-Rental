version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: rentacar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rentacar
      POSTGRES_USER: rentacar
      POSTGRES_PASSWORD: rentacar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentacar -d rentacar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./Car-Rental-Service-Spring-Angular-NGZorro/Spring Boot
      dockerfile: Dockerfile
    container_name: rentacar_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rentacar
      SPRING_DATASOURCE_USERNAME: rentacar
      SPRING_DATASOURCE_PASSWORD: rentacar
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DATABASE_URL: postgresql://rentacar:rentacar@db:5432/rentacar
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: rentacar
      PGUSER: rentacar
      PGPASSWORD: rentacar
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ── Angular Frontend (pre-built locally, no Node.js build on EC2) ───────────
  frontend:
    build:
      context: ./Car-Rental-Service-Spring-Angular-NGZorro/Angular
      dockerfile: Dockerfile.prebuilt
    container_name: rentacar_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
